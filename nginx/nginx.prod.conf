# Minimal hardened reverse proxy for the prod profile.
# TLS termination, certs and per-domain headers are expected to be supplied
# at deploy time. This is a sane default for local prod-profile trials.

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Basic size limits
    client_max_body_size 5m;

    # Upstreams
    upstream backend_upstream {
        server backend:8000;
    }
    upstream frontend_upstream {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers (extend with HSTS once TLS is in place)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAPI docs
        location /docs {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
        }

        # Frontend (SvelteKit)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}